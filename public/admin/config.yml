backend:
  name: github
  repo: omar4917/Affiliate-Marketing-Site
  branch: main
  base_url: https://reviews.synchrove.com
  auth_endpoint: api/auth

local_backend: true

media_folder: 'public/images/blog-post-photos'
public_folder: '/images/blog-post-photos'

media_library:
  name: uploadcare
  config:
    publicKey: 5b3cebb98babce9528b4
    settings:
      crop: 'free, 16:9, 1:1'

collections:
  - name: 'post'
    label: 'Post'
    folder: 'src/data/post'
    create: true
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'string' }
      - { label: 'Category', name: 'category', widget: 'string' }
      - {
          label: 'Tags',
          name: 'tags',
          widget: 'list',
          allow_add: true,
          allow_delete: true,
          collapsed: false,
          field: { label: 'Tag', name: 'tag', widget: 'string' },
        }
      - { label: 'Image', name: 'image', widget: 'image' }
      - { label: 'Image Alt Text', name: 'imageAlt', widget: 'string', required: false }
      - { label: 'Image Title', name: 'imageTitle', widget: 'string', required: false }
      - { label: 'Publish Date', name: 'publishDate', widget: 'datetime', required: false }
      - { label: 'Author', name: 'author', widget: 'string' }
      - { label: 'Content', name: 'body', widget: 'markdown' }

  - name: 'review'
    label: 'Product Review'
    folder: 'src/data/review'
    create: true
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Category', name: 'category', widget: 'string' }
      - { label: 'Product Image URL/File', name: 'image', widget: 'image' }
      - { label: 'Rating', name: 'rating', widget: 'number', value_type: 'float' }
      - { label: 'Best Price', name: 'price', widget: 'string' }
      - { label: 'Short Verdict', name: 'verdict', widget: 'string' }
      - {
          label: 'Key Features List',
          name: 'features',
          widget: 'list',
          field: { label: 'Feature', name: 'feature', widget: 'string' },
        }
      - { label: 'Affiliate URL', name: 'affiliateUrl', widget: 'string' }
      - { label: 'CTA Text', name: 'ctaText', widget: 'string' }
      - { label: 'Is Winner', name: 'isWinner', widget: 'boolean', required: false }
      - { label: 'Winner Label (Badge)', name: 'winnerLabel', widget: 'string', required: false }
      - {
          label: 'Ribbon Color',
          name: 'ribbonColor',
          widget: 'select',
          options: ['primary', 'secondary', 'accent', 'success', 'warning'],
          required: false,
        }
      - { label: 'Review Description', name: 'description', widget: 'text' }
      - label: 'Specs'
        name: 'specs'
        widget: 'object'
        fields:
          - { label: 'Outsole Type', name: 'Outsole Type', widget: 'string', required: false }
          - { label: 'Boot Weight', name: 'Boot Weight', widget: 'string', required: false }
          - { label: 'Primary Focus', name: 'Primary Focus', widget: 'string', required: false }
          - { label: 'Fit Profile', name: 'Fit Profile', widget: 'string', required: false }
      - label: 'Pros'
        name: 'pros'
        widget: 'list'
        field: { label: 'Pro', name: 'pro', widget: 'string' }
      - label: 'Cons'
        name: 'cons'
        widget: 'list'
        field: { label: 'Con', name: 'con', widget: 'string' }
