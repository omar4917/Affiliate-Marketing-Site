site:
  name: Football Gear & Tactics
  site: 'https://reviews.synchrove.com'
  base: '/'
  trailingSlash: true

  googleSiteVerificationId: ''
  impactSiteVerificationId: '78210222-a6b8-4250-93fa-38ddb422d687'

# Default SEO metadata
metadata:
  title:
    default: Football Gear & Tactics
    template: '%s — Football Gear & Tactics'
  description: '⚽ Read in-depth football tactics analysis, training drill guides, and honest equipment reviews.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Football Gear & Tactics
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: ''
    site: ''
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-MVRR0YNYL5' # or "G-XXXXXXXXXX"
      partytown: false

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
